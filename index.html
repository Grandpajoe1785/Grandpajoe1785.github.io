<!DOCTYPE html>
<html>
<head>
    <title>Fishing App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: system-ui, Arial;
            background: #0a0f14;
            color: white;
        }

        /* TOP APP BAR */
        .topbar {
            position: sticky;
            top: 0;
            background: #0f1720;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .pill {
            font-size: 12px;
            padding: 5px 10px;
            background: #1aa3ff;
            border-radius: 20px;
        }

        /* LAYOUT */
        .container {
            padding: 12px;
            max-width: 900px;
            margin: auto;
        }

        /* CARDS */
        .card {
            background: #121a24;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 12px;
        }

        h2 {
            font-size: 16px;
            margin: 0 0 10px 0;
        }

        iframe {
            width: 100%;
            height: 280px;
            border: none;
            border-radius: 10px;
        }

        /* INPUTS */
        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 10px;
            border: none;
            background: #1b2633;
            color: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 10px;
            border: none;
            background: #1aa3ff;
            color: white;
            font-weight: bold;
        }

        button:active {
            transform: scale(0.98);
        }

        .log {
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 10px;
            background: #121a24;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .small {
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="topbar">
    🎣 Fishing App
    <div class="pill">LIVE</div>
</div>

<div class="container">

    <!-- TABS -->
    <div class="tabs">
        <div class="tab">Dashboard</div>
        <div class="tab">Map</div>
        <div class="tab">Log</div>
    </div>

    <!-- WEATHER CARD -->
    <div class="card">
        <h2>🌬️ Wind Radar</h2>
        <iframe src="https://embed.windy.com/embed2.html?lat=-27.47&lon=153.02&zoom=7&level=surface&overlay=wind"></iframe>
        <div class="small">Wind conditions for fishing</div>
    </div>

    <!-- QUICK TIPS -->
    <div class="card">
        <h2>⚡ Fishing Tip</h2>
        <div class="small">
            • Rising tide = baitfish move in<br>
            • Cloudy + wind = better bite<br>
            • Dawn & dusk = peak time 🎣
        </div>
    </div>

    <!-- MAP -->
    <div class="card">
        <h2>📍 Spot Map</h2>
        <iframe src="https://www.google.com/maps?q=balmoral+beach+sydney&output=embed"></iframe>
    </div>

    <!-- LOG -->
    <div class="card">
        <h2>🎣 Catch Log</h2>

        <input id="fish" placeholder="Fish (e.g. Tailor)">
        <input id="spot" placeholder="Spot (e.g. Balmoral)">

        <button onclick="addCatch()">Add Catch</button>

        <div id="log" class="log"></div>
    </div>

</div>

<script>
let catches = [];

function addCatch() {
    const fish = document.getElementById("fish").value;
    const spot = document.getElementById("spot").value;

    if (!fish || !spot) return;

    catches.push({ fish, spot });

    document.getElementById("log").innerHTML =
        catches.map(c => `🐟 ${c.fish} — 📍 ${c.spot}`).join("<br>");
}
</script>

</body>
</html>
