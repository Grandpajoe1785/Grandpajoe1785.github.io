<!DOCTYPE html>
<html>
<head>
    <title>Fishing App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: system-ui, Arial;
            background: #0a0f14;
            color: white;
        }

        .topbar {
            position: sticky;
            top: 0;
            background: rgba(15, 23, 32, 0.9);
            backdrop-filter: blur(10px);
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .pill {
            font-size: 12px;
            padding: 5px 10px;
            background: #1aa3ff;
            border-radius: 20px;
        }

        .container {
            padding: 12px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: #121a24;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        h2 {
            font-size: 16px;
            margin: 0 0 10px 0;
        }

        iframe {
            width: 100%;
            height: 280px;
            border: none;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 10px;
            border: none;
            background: #1b2633;
            color: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 10px;
            border: none;
            background: #1aa3ff;
            color: white;
            font-weight: bold;
        }

        .log {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.5;
        }
    </style>
</head>

<body>

<div class="topbar">
    🎣 Fishing App
    <div class="pill">LIVE</div>
</div>

<div class="container">

    <div class="card">
        <h2>🌬️ Wind Radar</h2>
        <iframe src="https://embed.windy.com/embed2.html?lat=-27.47&lon=153.02&zoom=7&level=surface&overlay=wind"></iframe>
    </div>

    <div class="card">
        <h2>⚡ Fishing Tips</h2>
        <p>
            🌊 Rising tide = best fishing<br>
            🌤️ Cloudy + wind = better bite<br>
            🌅 Dawn & dusk = peak time
        </p>
    </div>

    <div class="card">
        <h2>📍 Fishing Map</h2>
        <iframe src="https://www.google.com/maps?q=balmoral+beach+sydney&output=embed"></iframe>
    </div>

    <div class="card">
        <h2>🎣 Catch Log</h2>

        <input id="fish" placeholder="Fish (e.g. Tailor)">
        <input id="spot" placeholder="Spot (e.g. Balmoral)">

        <button onclick="addCatch()">Add Catch</button>

        <div id="log" class="log"></div>
    </div>

</div>

<script>
let catches = [];

function addCatch() {
    const fish = document.getElementById("fish").value;
    const spot = document.getElementById("spot").value;

    if (!fish || !spot) return;

    catches.push({ fish, spot });

    document.getElementById("log").innerHTML =
        catches.map(c => `🐟 ${c.fish} — 📍 ${c.spot}`).join("<br>");
}
</script>

</body>
</html>
