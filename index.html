<!DOCTYPE html>
<html>
<head>
    <title>Fishing App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: system-ui, Arial;
            color: white;
            overflow-x: hidden;
        }

        /* BACKGROUND SLIDESHOW */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-size: cover;
            background-position: center;
            filter: blur(6px) brightness(0.45);
            transform: scale(1.1);
            transition: background-image 1.5s ease-in-out;
        }

        /* DARK OVERLAY */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.35);
            z-index: -1;
        }

        /* TOP BAR */
        .topbar {
            position: sticky;
            top: 0;
            padding: 14px;
            background: rgba(10,15,20,0.7);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .pill {
            background: #1aa3ff;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 12px;
        }

        /* GLASS CARDS */
        .card {
            background: rgba(18, 26, 36, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        iframe {
            width: 100%;
            height: 280px;
            border: none;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 10px;
            border: none;
            background: #1aa3ff;
            color: white;
            font-weight: bold;
        }

        .log {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="topbar">
    🎣 Fishing App
    <div class="pill">LIVE</div>
</div>

<div class="container">

    <div class="card">
        <h3>🌬️ Wind Radar</h3>
        <iframe src="https://embed.windy.com/embed2.html?lat=-27.47&lon=153.02&zoom=7&level=surface&overlay=wind"></iframe>
    </div>

    <div class="card">
        <h3>⚡ Fishing Tip</h3>
        <p>🌊 Rising tide = baitfish move in<br>🌤️ Cloud + wind = better bite<br>🌅 Dawn & dusk = best time</p>
    </div>

    <div class="card">
        <h3>📍 Map</h3>
        <iframe src="https://www.google.com/maps?q=balmoral+beach+sydney&output=embed"></iframe>
    </div>

    <div class="card">
        <h3>🎣 Catch Log</h3>

        <input id="fish" placeholder="Fish (e.g. Tuna)">
        <input id="spot" placeholder="Spot (e.g. Balmoral)">

        <button onclick="addCatch()">Add Catch</button>

        <div id="log" class="log"></div>
    </div>

</div>

<script>
let catches = [];

/* BACKGROUND IMAGES */
const images = [
    "https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1500&q=80",
    "https://images.unsplash.com/photo-1515704089429-fd06e6668458?auto=format&fit=crop&w=1500&q=80",
    "https://images.unsplash.com/photo-1500462918059-b1a0cb512f1d?auto=format&fit=crop&w=1500&q=80"
];

let i = 0;
const bg = document.querySelector(".bg");

function changeBg() {
    bg.style.backgroundImage = `url('${images[i]}')`;
    i = (i + 1) % images.length;
}

changeBg();
setInterval(changeBg, 6000);

/* CATCH LOG */
function addCatch() {
    const fish = document.getElementById("fish").value;
    const spot = document.getElementById("spot").value;

    if (!fish || !spot) return;

    catches.push({ fish, spot });

    document.getElementById("log").innerHTML =
        catches.map(c => `🐟 ${c.fish} — 📍 ${c.spot}`).join("<br>");
}
</script>

</body>
</html>
